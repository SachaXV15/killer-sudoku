<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Killer Sudoku Helper</title>

<style>
body {
  font-family: -apple-system, Arial;
  background: #f5f5f7;
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 8px;
  margin: 10px 0;
}

.btn {
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  background: white;
  border: 1px solid #ccc;
  cursor: pointer;
}

.btn.active {
  background: #007AFF;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  background: #007AFF;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: white;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>🧩 Killer Sudoku</h2>

<input type="number" id="sum" placeholder="Somme cible">
<input type="number" id="length" placeholder="Nombre de cases">

<p><b>Inclure :</b></p>
<div class="grid" id="includeGrid"></div>

<p><b>Exclure :</b></p>
<div class="grid" id="excludeGrid"></div>

<button onclick="solve()">Calculer</button>

<div class="result" id="result"></div>

<script>
const includeSet = new Set();
const excludeSet = new Set();

function createGrid(container, set) {
  for (let i = 1; i <= 9; i++) {
    const btn = document.createElement("div");
    btn.innerText = i;
    btn.className = "btn";

    btn.onclick = () => {
      if (set.has(i)) {
        set.delete(i);
        btn.classList.remove("active");
      } else {
        set.add(i);
        btn.classList.add("active");
      }
    };

    container.appendChild(btn);
  }
}

createGrid(document.getElementById("includeGrid"), includeSet);
createGrid(document.getElementById("excludeGrid"), excludeSet);

function getCombinations(arr, length) {
  let result = [];

  function helper(start, combo) {
    if (combo.length === length) {
      result.push([...combo]);
      return;
    }

    for (let i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      helper(i + 1, combo);
      combo.pop();
    }
  }

  helper(0, []);
  return result;
}

function solve() {
  const sum = parseInt(document.getElementById("sum").value);
  const length = parseInt(document.getElementById("length").value);

  let digits = [1,2,3,4,5,6,7,8,9];
  digits = digits.filter(d => !excludeSet.has(d));

  const combos = getCombinations(digits, length);

  const valid = combos.filter(c => {
    if (c.reduce((a,b)=>a+b,0) !== sum) return false;
    return [...includeSet].every(i => c.includes(i));
  });

  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = valid.length
    ? `<b>${valid.length} combinaison(s)</b><br>${valid.map(c => c.join(" ")).join("<br>")}`
    : "❌ Aucune combinaison";
}

// PWA offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
