<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Killer Sudoku Helper</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      font-size: 16px;
    }

    button {
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 8px;
    }

    .result {
      margin-top: 20px;
      background: #f3f3f3;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>🧩 Killer Sudoku Helper</h2>

<input type="number" id="sum" placeholder="Somme cible">
<input type="number" id="length" placeholder="Nombre de cases">

<input type="text" id="include" placeholder="Inclure (ex: 1,5)">
<input type="text" id="exclude" placeholder="Exclure (ex: 2,3)">

<button onclick="solve()">Calculer</button>

<div class="result" id="result"></div>

<script>
function getCombinations(arr, length) {
  let result = [];

  function helper(start, combo) {
    if (combo.length === length) {
      result.push([...combo]);
      return;
    }

    for (let i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      helper(i + 1, combo);
      combo.pop();
    }
  }

  helper(0, []);
  return result;
}

function solve() {
  const sum = parseInt(document.getElementById("sum").value);
  const length = parseInt(document.getElementById("length").value);

  const include = document.getElementById("include").value
    .split(',')
    .map(x => parseInt(x))
    .filter(x => !isNaN(x));

  const exclude = document.getElementById("exclude").value
    .split(',')
    .map(x => parseInt(x))
    .filter(x => !isNaN(x));

  let digits = [1,2,3,4,5,6,7,8,9];
  digits = digits.filter(d => !exclude.includes(d));

  const combos = getCombinations(digits, length);

  const valid = combos.filter(c => {
    if (c.reduce((a,b)=>a+b,0) !== sum) return false;
    return include.every(i => c.includes(i));
  });

  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = valid.length
    ? `<b>${valid.length} combinaison(s)</b><br>${valid.map(c => c.join(", ")).join("<br>")}`
    : "❌ Aucune combinaison";
}

// Activer le mode offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
